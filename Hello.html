<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>藤川予備校</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="「藤川予備校」公式サイト。中学生・高校生対象、定期テスト対策から受験指導まで。" />
  <style>
    :root {
      --main: #1b73b3;
      --accent: #f5a623;
      --bg: #f7f9fc;
      --text: #333;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e3e7ee;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar {
      background: var(--main);
      color: #fff;
      font-size: 0.85rem;
      padding: 4px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar span {
      margin-right: 8px;
    }

    .top-bar a {
      color: #fff;
      text-decoration: underline;
    }

    .nav {
      max-width: 1080px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--main), #4bb4ff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .logo-text-main {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .logo-text-sub {
      font-size: 0.75rem;
      color: #777;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      font-size: 0.95rem;
    }

    .nav-links a {
      position: relative;
      padding-bottom: 2px;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0;
      height: 2px;
      background: var(--main);
      transition: width 0.2s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .hero {
      background: radial-gradient(circle at top left, #e4f2ff, #f7f9fc);
      border-bottom: 1px solid #e3e7ee;
    }

    .hero-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 16px 48px;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2.5fr);
      gap: 32px;
      align-items: center;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #d0e3ff;
      font-size: 0.8rem;
      color: var(--main);
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: 2.1rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hero-title span {
      color: var(--main);
    }

    .hero-sub {
      font-size: 0.98rem;
      color: #555;
      margin-bottom: 20px;
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .hero-point {
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #e0e6f0;
    }

    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn-primary {
      background: var(--main);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .btn-outline {
      border-radius: 999px;
      border: 1px solid var(--main);
      color: var(--main);
      padding: 9px 16px;
      font-size: 0.9rem;
      background: #fff;
    }

    .hero-note {
      font-size: 0.8rem;
      color: #777;
    }

    .hero-image {
      position: relative;
      padding: 24px;
    }

    .hero-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      padding: 18px 16px;
      margin-bottom: 16px;
    }

    .hero-card-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .hero-card-body {
      font-size: 0.8rem;
      color: #555;
    }

    .hero-badge {
      position: absolute;
      right: 16px;
      top: 16px;
      background: var(--accent);
      color: #fff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    section {
      margin-bottom: 48px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .section-sub {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 20px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .feature-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e3e7ee;
    }

    .feature-label {
      font-size: 0.75rem;
      color: var(--main);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .feature-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .feature-body {
      font-size: 0.85rem;
      color: #555;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .course-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e3e7ee;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .course-tag {
      font-size: 0.75rem;
      color: #fff;
      background: var(--main);
      padding: 2px 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .course-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .course-target {
      font-size: 0.8rem;
      color: #777;
    }

    .course-body {
      font-size: 0.85rem;
      color: #555;
      flex: 1;
    }

    .course-meta {
      font-size: 0.8rem;
      color: #555;
    }

    .course-meta span {
      display: inline-block;
      margin-right: 8px;
    }

    .results {
      display: grid;
      grid-template-columns: 2fr 3fr;
      gap: 20px;
      align-items: flex-start;
    }

    .results-highlight {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e3e7ee;
    }

    .results-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--main);
      margin-bottom: 4px;
    }

    .results-label {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 8px;
    }

    .results-note {
      font-size: 0.75rem;
      color: #888;
    }

    .results-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      font-size: 0.8rem;
    }

    .results-item {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #e3e7ee;
    }

    .results-item-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .results-item-body {
      color: #555;
    }

    .flow {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e3e7ee;
    }

    .flow-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      font-size: 0.8rem;
    }

    .flow-step {
      position: relative;
      padding: 10px;
      border-radius: 10px;
      background: #f7f9fc;
      border: 1px dashed #c7d4ea;
    }

    .flow-step-number {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--main);
      margin-bottom: 4px;
    }

    .flow-step-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .flow-step-body {
      color: #555;
    }

    .contact {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 20px;
      align-items: flex-start;
    }

    .contact-form {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e3e7ee;
    }

    .contact-form-row {
      margin-bottom: 10px;
    }

    .contact-form-row label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .contact-form-row input,
    .contact-form-row select,
    .contact-form-row textarea {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccd3e0;
      font-size: 0.85rem;
      font-family: inherit;
    }

    .contact-form-row textarea {
      min-height: 80px;
      resize: vertical;
    }

    .contact-form-note {
      font-size: 0.75rem;
      color: #777;
      margin-top: 4px;
    }

    .contact-info {
      font-size: 0.85rem;
    }

    .contact-info-block {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e3e7ee;
      margin-bottom: 10px;
    }

    .contact-info-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .contact-info-body {
      color: #555;
    }

    footer {
      border-top: 1px solid #e3e7ee;
      background: #fff;
      font-size: 0.8rem;
      color: #777;
    }

    .footer-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .footer-links {
      display: flex;
      gap: 12px;
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: minmax(0, 1fr);
      }
      .hero-image {
        order: -1;
      }
      .features,
      .courses-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .results {
        grid-template-columns: minmax(0, 1fr);
      }
      .flow-steps {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .contact {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (max-width: 640px) {
      .nav {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .nav-links {
        flex-wrap: wrap;
        gap: 12px;
      }
      .features,
      .courses-grid,
      .results-list,
      .flow-steps {
        grid-template-columns: minmax(0, 1fr);
      }
      .hero-title {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="top-bar">
      <div>

      <div class="nav-links">

        <a href="#results">合格実績</a>

      </div>
    </nav>
  </header>
